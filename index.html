<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapVault — Your Visual Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8c547;
    --accent2: #ff6b35;
    --text: #f0ece4;
    --muted: #888;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .count-badge {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .add-bar {
    padding: 32px 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .url-row { display: flex; gap: 12px; max-width: 700px; }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  .btn-save {
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: var(--radius);
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, background 0.2s;
  }
  .btn-save:hover { background: #f0d060; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  .drop-zone {
    margin: 32px 48px;
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,197,71,0.04);
  }
  .drop-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .drop-label { font-size: 0.82rem; color: var(--muted); letter-spacing: 1px; }
  .drop-label strong { color: var(--text); }
  #file-input { display: none; }

  .gallery-header {
    padding: 0 48px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .gallery-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  .gallery {
    padding: 0 48px 80px;
    columns: 4 220px;
    column-gap: 16px;
  }

  .img-card {
    break-inside: avoid;
    margin-bottom: 16px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    position: relative;
    animation: fadeUp 0.35s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .img-card img {
    width: 100%;
    display: block;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .img-card:hover img { transform: scale(1.03); }

  .img-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .img-card:hover .img-actions { opacity: 1; }

  .action-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: transform 0.15s;
  }
  .action-btn:hover { transform: scale(1.15); }
  .btn-del { background: rgba(255,80,80,0.85); color: #fff; }
  .btn-dl  { background: rgba(232,197,71,0.9); color: #0d0d0d; }

  /* Link-only fallback card */
  .link-card-inner {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 120px;
    justify-content: center;
  }
  .link-badge {
    font-size: 0.62rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 4px;
    padding: 2px 8px;
    width: fit-content;
  }
  .link-icon { font-size: 1.8rem; }
  .link-url {
    font-size: 0.7rem;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.5;
    text-decoration: none;
    border-bottom: 1px dashed rgba(232,197,71,0.4);
    padding-bottom: 4px;
  }
  .link-url:hover { color: #f0d060; }
  .link-open-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 5px 12px;
    cursor: pointer;
    width: fit-content;
  }
  .link-open-btn:hover { color: var(--text); border-color: var(--text); }

  .empty {
    text-align: center;
    padding: 80px 48px;
    color: var(--muted);
  }
  .empty-icon { font-size: 4rem; margin-bottom: 16px; display: block; }
  .empty-text { font-size: 0.82rem; letter-spacing: 1px; line-height: 2; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 40px;
    letter-spacing: 1px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    header, .add-bar, .drop-zone, .gallery, .gallery-header { padding-left: 20px; padding-right: 20px; }
    .drop-zone { margin: 20px; }
    .gallery { columns: 2 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Snap<span>Vault</span></div>
  <div class="count-badge" id="count-badge">0 items saved</div>
</header>

<div class="add-bar">
  <div class="url-row">
    <input class="url-input" id="url-input" type="text" placeholder="Paste an image or GIF URL here…" />
    <button class="btn-save" onclick="saveFromURL()">⚡ Save</button>
  </div>
</div>

<div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept="image/*,.gif" multiple onchange="handleFiles(this.files)" />
  <span class="drop-icon">🖼️</span>
  <div class="drop-label"><strong>Drag & drop images or GIFs here</strong><br>or click to browse files</div>
</div>

<div class="gallery-header">
  <div class="gallery-title">Your Collection</div>
  <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<div id="gallery" class="gallery"></div>
<div id="empty" class="empty">
  <span class="empty-icon">📭</span>
  <div class="empty-text">Your vault is empty.<br>Paste a URL or drop some images to get started.</div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── IndexedDB ──
  let db;
  let images = [];

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('SnapVaultDB', 1);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('images')) {
          const store = d.createObjectStore('images', { keyPath: 'id' });
          store.createIndex('ts', 'ts', { unique: false });
        }
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGetAll() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('images', 'readonly');
      const req = tx.objectStore('images').index('ts').getAll();
      req.onsuccess = () => resolve(req.result.reverse());
      req.onerror = () => reject(req.error);
    });
  }

  function dbPut(img) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('images', 'readwrite');
      const req = tx.objectStore('images').put(img);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function dbDelete(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('images', 'readwrite');
      const req = tx.objectStore('images').delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function dbClear() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('images', 'readwrite');
      const req = tx.objectStore('images').clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function loadImages() {
    try {
      db = await openDB();
      images = await dbGetAll();
    } catch(e) {
      console.error('DB error', e);
      images = [];
    }
    renderAll();
  }

  // ── UI helpers ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateBadge() {
    const n = images.length;
    document.getElementById('count-badge').textContent =
      n === 0 ? '0 items saved' : `${n} item${n===1?'':'s'} saved`;
  }

  // ── Render ──
  function renderAll() {
    const gallery = document.getElementById('gallery');
    const empty   = document.getElementById('empty');
    gallery.innerHTML = '';
    if (images.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      images.forEach((img, i) => addCard(img.src, img.id, i));
    }
    updateBadge();
  }

  function addCard(src, id, index) {
    const gallery = document.getElementById('gallery');
    const card = document.createElement('div');
    card.className = 'img-card';
    card.style.animationDelay = `${Math.min(index * 0.04, 0.4)}s`;

    const imgEl = document.createElement('img');
    imgEl.src = src;
    imgEl.alt = 'Saved image';
    imgEl.loading = 'lazy';

    imgEl.onerror = () => {
      imgEl.remove();
      const inner = document.createElement('div');
      inner.className = 'link-card-inner';
      const badge = document.createElement('div');
      badge.className = 'link-badge';
      badge.textContent = '⚠ link only';
      const icon = document.createElement('div');
      icon.className = 'link-icon';
      icon.textContent = src.match(/\.gif(\?|$)/i) ? '🎞️' : '🔗';
      const linkEl = document.createElement('a');
      linkEl.className = 'link-url';
      linkEl.href = src;
      linkEl.target = '_blank';
      try {
        const u = new URL(src);
        linkEl.textContent = u.hostname + (u.pathname.length > 30 ? u.pathname.slice(0,30)+'…' : u.pathname);
      } catch(e) { linkEl.textContent = src.slice(0,50)+'…'; }
      const openBtn = document.createElement('button');
      openBtn.className = 'link-open-btn';
      openBtn.textContent = '↗ Open in new tab';
      openBtn.onclick = () => window.open(src, '_blank');
      inner.appendChild(badge);
      inner.appendChild(icon);
      inner.appendChild(linkEl);
      inner.appendChild(openBtn);
      card.insertBefore(inner, card.firstChild);
    };

    card.appendChild(imgEl);

    const actions = document.createElement('div');
    actions.className = 'img-actions';

    const dlBtn = document.createElement('button');
    dlBtn.className = 'action-btn btn-dl';
    dlBtn.innerHTML = '⬇';
    dlBtn.title = 'Download';
    dlBtn.onclick = (e) => { e.stopPropagation(); downloadImage(src); };

    const delBtn = document.createElement('button');
    delBtn.className = 'action-btn btn-del';
    delBtn.innerHTML = '✕';
    delBtn.title = 'Delete';
    delBtn.onclick = (e) => { e.stopPropagation(); removeImage(id); };

    actions.appendChild(dlBtn);
    actions.appendChild(delBtn);
    card.appendChild(actions);
    gallery.appendChild(card);
  }

  // ── CRUD ──
  async function addImage(src) {
    if (images.some(i => i.src === src)) { showToast('Already in vault!'); return; }
    const img = {
      id: 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      src,
      ts: Date.now()
    };
    images.unshift(img);
    await dbPut(img);
    renderAll();
    showToast('⚡ Saved to vault!');
  }

  async function removeImage(id) {
    images = images.filter(i => i.id !== id);
    await dbDelete(id);
    renderAll();
    showToast('Removed.');
  }

  async function clearAll() {
    if (images.length === 0) return;
    if (!confirm('Clear your entire vault?')) return;
    images = [];
    await dbClear();
    renderAll();
    showToast('Vault cleared.');
  }

  // ── Download (never navigates away) ──
  async function downloadImage(src) {
    try {
      let blob;
      if (src.startsWith('data:')) {
        const res = await fetch(src);
        blob = await res.blob();
      } else {
        const res = await fetch(src, { mode: 'cors' });
        blob = await res.blob();
      }
      const ext = blob.type.split('/')[1]?.replace('jpeg','jpg') || 'png';
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = 'snapvault-' + Date.now() + '.' + ext;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 2000);
      showToast('⬇ Downloading…');
    } catch(e) {
      window.open(src, '_blank', 'noopener,noreferrer');
    }
  }

  // ── Input ──
  function saveFromURL() {
    const input = document.getElementById('url-input');
    const url = input.value.trim();
    if (!url) { showToast('Paste a URL first!'); return; }
    addImage(url);
    input.value = '';
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveFromURL();
  });

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => addImage(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  // ── Drag & drop ──
  const dz = document.getElementById('drop-zone');

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    const urlData = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
    if (files && files.length > 0) handleFiles(files);
    else if (urlData) urlData.split('\n').map(u=>u.trim()).filter(Boolean).forEach(addImage);
  });

  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => {
    if (e.target === dz || dz.contains(e.target)) return;
    e.preventDefault();
    const urlData = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
    const files = e.dataTransfer.files;
    if (files && files.length > 0) handleFiles(files);
    else if (urlData) urlData.split('\n').map(u=>u.trim()).filter(Boolean).forEach(addImage);
  });

  // ── Boot ──
  loadImages();
</script>
</body>
</html>
